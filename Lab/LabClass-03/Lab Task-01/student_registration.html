<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task-01</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>

             <label for="fname">Full Name : </label>
            <input type="text" name="fname" required>
            <br><br>
             <label for="studentid">Student ID : </label>
            <input type="text" name="studentid" required>
            <br><br>
             <label for="email">Email : </label>
            <input type="email" name="email" required>
            <br><br>

             <label for="phone">Phone No : </label>
            <input type="tel" name="phone" id="phone" required>
            <br><br>

            <label for="dob">Date Of Birth : </label>
            <input type="date" name="dob" id="dob" required>
            <br><br>

            <label>Gender : </label><br>
             <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
            <br><br>

            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
            <br><br>

        </fieldset>

        <fieldset>
            <legend>Academic Information</legend>

            
            <label for="department">Department :</label>
            <select id="department" name="department"><br>
                <option value="CSE" selected>CSE</option>
                <option value="EEE" selected>EEE</option>
                <option value="BBA" selected>BBA</option>
                <option value="English" selected>English</option>
                <option value="Civil Engineering" selected>Civil Engineering</option>
            </select><br><br>

            <label for="semester">Semester : </label>
            <select id="semester" name="semester"><br>
                <option value="1st semester" selected>1st Semester</option>
                <option value="2nd semester" selected>2nd semester</option>
                <option value="3rd semester" selected>3rd semester</option>
                <option value="4th semester" selected>4th semester</option>
                <option value="5th semester" selected>5th semester</option>
                <option value="6th semester" selected>6th semester</option>
                <option value="7th semester" selected>7th semester</option>
                <option value="8th semester" selected>8th semester</option>
            </select><br><br>

            <label>Programming :</label><br>
              <input type="checkbox" id="c" name="language" value="c">C
            <label for="c"></label><br>

            <input type="checkbox" id="c++" name="language" value="c++">Python
            <label for="c++"></label><br>
            
             <input type="checkbox" id="java" name="language" value="Java">Java
            <label for="java"></label><br>

            <input type="checkbox" id="python" name="language" value="Python">Python
            <label for="python"></label><br>

            <input type="checkbox" id="javascript" name="language" value="Javascript">Javascript
            <label for="javascript"></label><br><br>
        </fieldset>

        <fieldset>
            <legend>Additional Information </legend><br>

             <label for="address">Address :</label><br>
            <textarea name="address" id="address" rows="4" cols="40"></textarea>
            <br><br>

             <label for="photo">Upload Student Photo :</label>
             <input type="file" id="photo" name="photo"><br><br>

              <label for="comments">Comments :</label><br>
            <textarea name="comments" id="comments" rows="4" cols="40"></textarea>
            <br><br>

           </fieldset><br><br>

       <input type="submit" value="Login">
       <input type="reset" value="reset">


    </form>
    
</body>
</html>
