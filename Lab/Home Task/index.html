<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Student Registration Form</h1>

    <form action="#" method="post">

            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            <br><br>

            <label for="studentid">Student ID:</label>
            <input type="text" id="studentid" name="studentid" placeholder="Enter your student ID" required>
            <br><br>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">
            <br><br>

            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>
       

        <br>

        

            <label for="department">Department:</label>
            <select id="department" name="department">
                <option value="CSE" selected>CSE</option>
                <option value="EEE">EEE</option>
                <option value="BBA">BBA</option>
                <option value="English">English</option>
                <option value="Civil Engineering">Civil Engineering</option>
            </select>
            <br><br>

       
          

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" cols="40"></textarea>
            <br><br>

            <label for="photo">Upload Student Photo:</label>
            <input type="file" id="photo" name="photo">
            <br><br>

            <label for="comments">Comments/Suggestions:</label>
            <textarea id="comments" name="comments" rows="5" cols="40" maxlength="200" placeholder="Write something"></textarea>
       
        <br>
  
        <input type="submit" value="Submit" class="btn">
        <input type="reset" value="Reset" class="btn">
    
    </form>

</div>
</body>
</html>
